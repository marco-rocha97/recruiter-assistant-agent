name: Deploy

on:
  push:
    branches: [main]

# 📚 Why: only one deploy runs at a time — avoids two concurrent Cloud Run revisions racing
concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

# Required GitHub secrets:
#   GCP_SA_KEY            — GCP service account JSON key (Artifact Registry Writer + Cloud Run Admin)
#   GEMINI_API_KEY        — passed as Cloud Run env var at runtime
#   OPENAI_API_KEY        — passed as Cloud Run env var at runtime
#   FIREBASE_TOKEN        — from `firebase login:ci` (Firebase Hosting deploy)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GCP_PROJECT: portfolio-496111
  GCP_REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/portfolio-496111/recruiter/recruiter-assistant-agent
  SERVICE: recruiter-assistant-agent

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # 📚 Why: the default docker driver doesn't support GHA layer cache; docker-container driver does
      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          # 📚 Why: tag by commit SHA so each deploy is traceable and rollbacks are exact
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: --allow-unauthenticated
          env_vars: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # 📚 Why: build is done here (not in CI) so VITE_API_BASE_URL is the live Cloud Run URL
      - run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ needs.deploy-backend.outputs.url }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }} --project ${{ env.GCP_PROJECT }}
        working-directory: ${{ github.workspace }}
